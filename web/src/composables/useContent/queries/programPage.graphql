query getProgramPageQuery($concertId: String!) {
  programPageCollection(where: { concertId: $concertId }, limit: 1) {
    items {
      pageTitle
      eyebrow
      intro
      concertDatum
      concertId
      programItemsCollection(limit: 20) {
        items {
          __typename
          ... on ContentTypeRichText {
            eyebrow
            title
            knockout
            body {
              json
            }
            ticketForm
            embeddedYouTubeId
          }
          ... on TeaserBlock {
            eyebrow
            title
            knockout
            fullWidth
            backgroundImage {
              url
              title
            }
            columnContentCollection(limit: 4) {
              items {
                __typename
                ... on ContentTypeRichText {
                  eyebrow
                  title
                  knockout
                  body {
                    json
                  }
                  ticketForm
                  embeddedYouTubeId
                }
                ... on FeaturedContent {
                  label
                  title
                  ctaText
                  ctaUrl
                  lead {
                    json
                  }
                }
              }
            }
          }
          ... on ProgramSetBlock {
            eyebrow
            title
            songsCollection(limit: 20) {
              items {
                title
                artist
                imageUrl
                linkedRepertoire {
                  sys {
                    id
                  }
                  title
                  artist
                  albumart {
                    url
                  }
                }
              }
            }
          }
        }
      }
    }
  }
}
